version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: daily-rewards-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: test_daily_rewards
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_daily_rewards"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: daily-rewards-test-api
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_daily_rewards
      JWT_SECRET: test-secret-for-testing-only
      POSTGRES_HOST: db
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: daily-rewards-tests
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_daily_rewards
      API_BASE: http://api:3000
    depends_on:
      - db
      - api
    volumes:
      - .:/app
    working_dir: /app
    command: ["bash", "-e", "-c", "bash scripts/run_tests.sh"]

volumes:
  test-db-data:
