version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: daily-rewards-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: test_daily_rewards
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: daily-rewards-test-api
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_daily_rewards
      JWT_SECRET: test-secret-for-testing-only
      POSTGRES_HOST: db
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: daily-rewards-tests
    environment:
      DATABASE_URL: postgresql://test:test@db:5432/test_daily_rewards
      API_BASE: http://api:3000
    depends_on:
      - db
      - api
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["bash", "-c"]
    command: >
      bash -e -c '
        echo "=== Running Backend Tests ===" &&
        cd backend && npx prisma migrate deploy --schema=./prisma/schema.prisma 2>&1 &&
        npx vitest run --reporter=verbose 2>&1 &&
        echo "" &&
        echo "=== Running Client Lua Tests ===" &&
        lua5.3 -e "
          local busted = require(\"busted\")
          busted.run({
            paths = { \"/app/client/tests/ui_tests.lua\" },
            summary = true,
            output = \"Test Output\"
          })
        " 2>&1 || echo "Busted not available, running manual tests" &&
        lua5.3 /app/client/tests/json_tests.lua 2>&1 &&
        lua5.3 /app/client/tests/ui_tests.lua 2>&1 &&
        echo "" &&
        echo "=== All Tests Complete ==="
      '

volumes:
  test-db-data:
