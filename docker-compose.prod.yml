# ═══════════════════════════════════════════════════════════
# Production environment
# Run: docker-compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: daily-rewards-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daily_rewards}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d daily_rewards"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: daily-rewards-api-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@db:5432/${POSTGRES_DB:-daily_rewards}
      JWT_SECRET: ${JWT_SECRET:-prod-secret-change-me}
      POSTGRES_HOST: db
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data-prod:
